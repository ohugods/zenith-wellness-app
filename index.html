<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="data:," />
    <title>Serene</title>
    <style>
      :root {
        --phone-w: 390px;
        --phone-h: 844px;
        --bezel: 11px;
        --radius-outer: 52px;
        --radius-inner: 42px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(ellipse 120% 80% at 50% -10%, #334155 0%, #0f172a 42%, #020617 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      .device {
        position: relative;
        width: var(--phone-w);
        height: var(--phone-h);
        padding: var(--bezel);
        border-radius: var(--radius-outer);
        background: linear-gradient(155deg, #2a2a2a 0%, #0c0c0c 42%, #1f1f1f 100%);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.07) inset,
          0 50px 100px -30px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(0, 0, 0, 0.6);
      }
      .display {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: var(--radius-inner);
        overflow: hidden;
        background: #000;
      }
      .island {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 118px;
        height: 32px;
        background: #0a0a0a;
        border-radius: 18px;
        z-index: 5;
        pointer-events: none;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
      }
      .home-bar {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 128px;
        height: 4px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.32);
        z-index: 5;
        pointer-events: none;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }
      @media (max-width: 767px) {
        body {
          padding: 0;
          display: block;
          background: #000;
        }
        .device {
          width: 100vw;
          height: 100dvh;
          max-height: 100dvh;
          padding: 0;
          border-radius: 0;
          box-shadow: none;
          background: #000;
        }
        .display {
          border-radius: 0;
        }
        .island,
        .home-bar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="device" role="presentation">
      <div class="display">
        <div class="island" aria-hidden="true"></div>
        <iframe src="screens/sess_es_de_medita_o.html" title="Serene"></iframe>
        <div class="home-bar" aria-hidden="true"></div>
      </div>
    </div>
  </body>
</html>
